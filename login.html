<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account - iMAGi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><rect fill="%23111" width="1200" height="800"/></svg>');
            background-size: cover;
        }
        .movie-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><rect fill="%23222" width="1200" height="800"/><rect fill="%23333" x="50" y="50" width="150" height="220" rx="8"/><rect fill="%23333" x="220" y="50" width="150" height="220" rx="8"/><rect fill="%23333" x="390" y="50" width="150" height="220" rx="8"/></svg>');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="movie-bg min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Form Container -->
        <div class="bg-blue-600 rounded-2xl shadow-2xl p-8 md:p-10">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-3xl md:text-4xl font-bold text-yellow-400 mb-2">Create Your Account</h1>
                <p class="text-white text-sm md:text-base">Step into the future of growth — join iMAGi today</p>
            </div>

            <!-- Form -->
            <form class="space-y-5">
                <!-- Name Fields -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- First Name -->
                    <div>
                        <label class="block text-white text-sm font-medium mb-2">First Name</label>
                        <input 
                            type="text" 
                            placeholder="Name Here"
                            class="w-full px-4 py-3 rounded-lg bg-blue-500 text-white placeholder-blue-200 border-2 border-blue-400 focus:border-white focus:outline-none transition duration-200"
                        >
                    </div>

                    <!-- Last Name -->
                    <div>
                        <label class="block text-white text-sm font-medium mb-2">Last Name</label>
                        <input 
                            type="text" 
                            placeholder="Name Here"
                            class="w-full px-4 py-3 rounded-lg bg-blue-500 text-white placeholder-blue-200 border-2 border-blue-400 focus:border-white focus:outline-none transition duration-200"
                        >
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-white text-sm font-medium mb-2">Email Address</label>
                    <input 
                        type="email" 
                        placeholder="hello@example.com"
                        class="w-full px-4 py-3 rounded-lg bg-blue-500 text-white placeholder-blue-200 border-2 border-blue-400 focus:border-white focus:outline-none transition duration-200"
                    >
                </div>

                <!-- Create Password -->
                <div>
                    <label class="block text-white text-sm font-medium mb-2">Create Password</label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password"
                            placeholder="••••••••"
                            class="w-full px-4 py-3 rounded-lg bg-blue-500 text-white placeholder-blue-200 border-2 border-blue-400 focus:border-white focus:outline-none transition duration-200 pr-12"
                        >
                        <button 
                            type="button"
                            onclick="togglePassword('password')"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-white hover:text-blue-200 transition"
                        >
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label class="block text-white text-sm font-medium mb-2">Confirm Password</label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="confirmPassword"
                            placeholder="••••••••"
                            class="w-full px-4 py-3 rounded-lg bg-blue-500 text-white placeholder-blue-200 border-2 border-blue-400 focus:border-white focus:outline-none transition duration-200 pr-12"
                        >
                        <button 
                            type="button"
                            onclick="togglePassword('confirmPassword')"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-white hover:text-blue-200 transition"
                        >
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit"
                    class="w-full bg-yellow-400 hover:bg-yellow-500 text-blue-900 font-bold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105 mt-6"
                >
                    Log In
                </button>

                <!-- Login Link -->
                <div class="text-center mt-6">
                    <p class="text-white text-sm">
                        Already have an account? 
                        <a href="#" class="text-yellow-400 hover:text-yellow-300 font-semibold transition">Log In</a>
                    </p>
                </div>
            </form>
        </div>
    </div>

    <script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
